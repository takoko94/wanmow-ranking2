<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<style>

/* ===== フォント ===== */

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:'Yasashisa',sans-serif;

background:#fffaf5;

color:#5c4b42;

position:relative;

user-select:none;

}

/* ===== 背景 ===== */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 10% 20%,
rgba(255,230,220,0.7),
transparent 18%
),

radial-gradient(
circle at 85% 20%,
rgba(255,240,235,0.8),
transparent 18%
),

radial-gradient(
circle at 50% 90%,
rgba(250,220,220,0.7),
transparent 20%
);

pointer-events:none;

}

/* ===== 肉球 ===== */

body::after{

content:"🐾 🐾 🦴 🐾 💖";

position:absolute;

top:20px;
left:30px;

font-size:70px;

letter-spacing:40px;

opacity:0.05;

pointer-events:none;

}

/* ===== 全体 ===== */

.wrapper{

width:1280px;
height:720px;

padding:12px;

display:flex;
flex-direction:column;

gap:10px;

position:relative;
z-index:2;

transition:opacity 1s;

overflow:hidden;

}

/* ===== 上バー ===== */

.topbar{

height:70px;

display:flex;

align-items:center;

gap:12px;

}

/* ===== LIVE ===== */

.live{

height:52px;

padding:0 20px;

display:flex;

align-items:center;
justify-content:center;

border-radius:999px;

background:#cfa18d;

color:white;

font-size:24px;

font-weight:900;

box-shadow:
0 4px 0 rgba(0,0,0,0.15);

flex-shrink:0;

}

/* ===== テロップ ===== */

.telop{

height:52px;

flex:1;

border-radius:999px;

background:white;

border:3px solid #e8dcd2;

display:flex;

align-items:center;

padding:0 22px;

font-size:22px;

font-weight:900;

color:#b88472;

box-shadow:
0 4px 0 rgba(0,0,0,0.08);

overflow:hidden;

white-space:nowrap;

}

/* ===== ロゴ ===== */

.top-logo{

height:56px;

width:auto;

object-fit:contain;

margin-left:auto;

filter:
drop-shadow(
0 4px 10px
rgba(0,0,0,0.08)
);

animation:floatLogo 3s ease-in-out infinite;

}

/* ===== メイン ===== */

.main{

flex:1;

display:flex;

gap:14px;

min-height:0;

}

/* ===== 左 ===== */

.left{

width:68%;

display:flex;

flex-direction:column;

gap:12px;

}

/* ===== 右 ===== */

.right{

width:32%;

display:flex;

flex-direction:column;

gap:12px;

}

/* ===== 共通BOX ===== */

.panel{

background:#fffdfb;

border-radius:28px;

border:3px solid #e8dcd2;

padding:14px;

box-shadow:
0 5px 0 rgba(0,0,0,0.08);

position:relative;

overflow:hidden;

}

/* ===== タイトル ===== */

.title{

height:52px;

display:flex;

align-items:center;
justify-content:center;

background:#f3ebe5;

border-radius:999px;

font-size:28px;

font-weight:900;

color:#8f6d61;

margin-bottom:12px;

border:3px solid #e8dcd2;

}

/* ===== TOP1 ===== */

.top1{

height:112px;

display:flex;

align-items:center;
justify-content:space-between;

padding:0 20px;

border-radius:24px;

background:#fff7ea;

border:3px solid #f1ddae;

box-shadow:
0 4px 0 rgba(0,0,0,0.08);

}

/* 王冠 */

.crown{

font-size:46px;

}

/* 名前 */

.top1-name{

font-size:46px;

font-weight:900;

color:#6b5248;

}

/* 票 */

.top1-vote{

background:#cfa18d;

color:white;

padding:10px 18px;

border-radius:999px;

font-size:28px;

font-weight:900;

box-shadow:
0 4px 0 rgba(0,0,0,0.15);

}

/* ===== ランク一覧 ===== */

.rank-list{

display:flex;

flex-direction:column;

gap:10px;

}

/* ===== ランク ===== */

.rank{

height:68px;

display:flex;

align-items:center;
justify-content:space-between;

padding:0 16px;

border-radius:22px;

background:white;

border:3px solid #e8dcd2;

box-shadow:
0 4px 0 rgba(0,0,0,0.08);

font-size:26px;

font-weight:900;

}

/* 左 */

.rank-left{

display:flex;

align-items:center;

gap:12px;

}

/* 順位 */

.rank-num{

width:44px;
height:44px;

display:flex;

align-items:center;
justify-content:center;

border-radius:999px;

background:#f3ebe5;

border:3px solid #e8dcd2;

font-size:20px;

}

/* 票 */

.vote{

background:#cfa18d;

color:white;

padding:6px 14px;

border-radius:999px;

font-size:20px;

box-shadow:
0 4px 0 rgba(0,0,0,0.12);

}

/* ===== 右グリッド ===== */

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:10px;

}

/* ===== 小カード ===== */

.small{

height:110px;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

border-radius:22px;

background:white;

border:3px solid #e8dcd2;

box-shadow:
0 4px 0 rgba(0,0,0,0.08);

position:relative;

}

/* リボン */

.small::before{

content:"🎀";

position:absolute;

top:6px;
left:8px;

font-size:18px;

opacity:0.7;

}

/* 順位 */

.small-rank{

font-size:18px;

color:#b88472;

margin-bottom:4px;

}

/* 名前 */

.small-name{

font-size:24px;

font-weight:900;

margin-bottom:6px;

text-align:center;

}

/* 票 */

.small-vote{

font-size:20px;

font-weight:900;

color:#b88472;

}

/* ===== 更新 ===== */

.update{

text-align:right;

font-size:13px;

opacity:0.65;

margin-top:2px;

}

/* ===== 画像 ===== */

#imageScreen{

opacity:0;
pointer-events:none;

position:absolute;

top:0;
left:0;

width:1280px;
height:720px;

z-index:999;

background:#fffaf5;

transition:opacity 1s;

overflow:hidden;

}

#imageScreen img{

width:100%;
height:100%;

object-fit:cover;

display:block;

}

/* ===== アニメ ===== */

@keyframes floatLogo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-4px);
}

100%{
transform:translateY(0px);
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3"
type="audio/mpeg">

</audio>

<!-- 画像切替 -->

<div id="imageScreen">

<img
src="event.jpg">

</div>

<!-- 全体 -->

<div class="wrapper">

<!-- 上 -->

<div class="topbar">

<div class="live">
LIVE
</div>

<div class="telop">

✨ 投票受付中！あなたの推し犬を応援しよう！ ✨

</div>

<img
src="logo.png"
class="top-logo">

</div>

<!-- メイン -->

<div class="main">

<!-- 左 -->

<div class="left">

<!-- TOP1 -->

<div class="panel">

<div class="title">
現在の1位
</div>

<div id="top1"></div>

</div>

<!-- TOP5 -->

<div class="panel" style="flex:1;">

<div class="title">
TOP5
</div>

<div class="rank-list"
id="top5">
</div>

</div>

</div>

<!-- 右 -->

<div class="right">

<div class="panel" style="flex:1;">

<div class="title">
6〜10位
</div>

<div class="grid"
id="top10">
</div>

</div>

<div class="update"
id="update">
更新中...
</div>

</div>

</div>

</div>

<script>

/* ===== GAS ===== */

const API_URL =
"https://script.google.com/macros/s/AKfycby7mjB5m4pMi63DHtdYOgfEZaQ7TJyAi3mOfndk7WHXyWDsvHeqFFCfdHI6BvjQQoNz6g/exec";

/* ===== ランキング ===== */

async function loadRanking(){

try{

const res =
await fetch(API_URL);

const data =
await res.json();

drawRanking(data);

document
.getElementById("update")
.innerText =
"最終更新：" +
new Date()
.toLocaleTimeString();

}catch(e){

console.log(e);

}

}

/* ===== 描画 ===== */

function drawRanking(ranking){

const top1 =
document.getElementById("top1");

const top5 =
document.getElementById("top5");

const top10 =
document.getElementById("top10");

top1.innerHTML = "";
top5.innerHTML = "";
top10.innerHTML = "";

if(ranking.length > 0){

const first = ranking[0];

top1.innerHTML = `

<div class="top1">

<div class="crown">
👑
</div>

<div class="top1-name">
${first.name}
</div>

<div class="top1-vote">
${first.votes}票
</div>

</div>

`;

}

ranking.forEach((dog,i)=>{

if(i >= 1 && i < 5){

top5.innerHTML += `

<div class="rank">

<div class="rank-left">

<div class="rank-num">
${i+1}
</div>

<div>
${dog.name}
</div>

</div>

<div class="vote">
${dog.votes}票
</div>

</div>

`;

}

if(i >= 5 && i < 10){

top10.innerHTML += `

<div class="small">

<div class="small-rank">
${i+1}位
</div>

<div class="small-name">
${dog.name}
</div>

<div class="small-vote">
${dog.votes}票
</div>

</div>

`;

}

});

}

/* ===== 初回 ===== */

loadRanking();

/* ===== 自動更新 ===== */

setInterval(
loadRanking,
10000
);

/* ===== BGM ===== */

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

/* ===== 切替 ===== */

const wrapper =
document.querySelector(
".wrapper"
);

const imageScreen =
document.getElementById(
"imageScreen"
);

let showImage = false;

setInterval(()=>{

showImage = !showImage;

if(showImage){

wrapper.style.opacity = "0";

imageScreen.style.opacity = "1";

imageScreen.style.pointerEvents =
"auto";

}else{

wrapper.style.opacity = "1";

imageScreen.style.opacity = "0";

imageScreen.style.pointerEvents =
"none";

}

},20000);

</script>

</body>
</html>
