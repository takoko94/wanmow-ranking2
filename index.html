<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<style>

/* ===== フォント ===== */

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:'Yasashisa',sans-serif;

background:
linear-gradient(
180deg,
#fff7fb 0%,
#ffeef5 100%
);

position:relative;

color:#6a4a43;

}

/* ===== 背景 ===== */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 15% 20%,
rgba(255,192,203,0.25),
transparent 18%
),

radial-gradient(
circle at 80% 10%,
rgba(255,220,235,0.35),
transparent 18%
),

radial-gradient(
circle at 50% 90%,
rgba(255,210,225,0.25),
transparent 20%
);

pointer-events:none;

}

/* ===== 浮いてる装飾 ===== */

.float{

position:absolute;

opacity:0.12;

font-size:42px;

animation:float 4s ease-in-out infinite;

pointer-events:none;

}

.f1{
top:30px;
left:50px;
}

.f2{
top:120px;
right:120px;
animation-delay:1s;
}

.f3{
bottom:140px;
left:80px;
animation-delay:2s;
}

.f4{
bottom:70px;
right:90px;
animation-delay:3s;
}

/* ===== 全体 ===== */

.wrapper{

width:1280px;
height:720px;

padding:16px;

display:flex;
flex-direction:column;

gap:12px;

position:relative;
z-index:2;

}

/* ===== 上バー ===== */

.topbar{

height:54px;

display:flex;

align-items:center;
justify-content:space-between;

}

/* LIVE */

.live{

display:flex;

align-items:center;

gap:12px;

}

/* LIVEバッジ */

.live-badge{

height:44px;

padding:0 20px;

border-radius:999px;

display:flex;

align-items:center;
justify-content:center;

background:
linear-gradient(
180deg,
#ff658d,
#ff2f68
);

color:white;

font-size:24px;

font-weight:900;

box-shadow:
0 6px 12px rgba(255,70,120,0.28);

border:4px solid white;

animation:pulse 1.5s infinite;

}

/* 時間 */

.clock{

font-size:30px;

font-weight:900;

color:#ff6f9f;

background:white;

padding:6px 18px;

border-radius:999px;

border:4px solid #ffd9e5;

}

/* テロップ */

.telop{

height:44px;

padding:0 24px;

border-radius:999px;

display:flex;

align-items:center;

background:white;

border:4px solid #ffdbe7;

font-size:22px;

font-weight:900;

color:#ff6f9f;

box-shadow:
0 5px 12px rgba(0,0,0,0.05);

}

/* ===== ロゴ ===== */

.logo-wrap{

height:120px;

display:flex;

align-items:center;
justify-content:center;

position:relative;

}

.logo{

max-width:720px;

max-height:120px;

object-fit:contain;

filter:
drop-shadow(
0 8px 18px
rgba(0,0,0,0.12)
);

animation:floatLogo 3s ease-in-out infinite;

}

/* ===== メイン ===== */

.main{

flex:1;

display:flex;

gap:16px;

}

/* ===== 左 ===== */

.left{

width:68%;

display:flex;

flex-direction:column;

gap:12px;

}

/* ===== 右 ===== */

.right{

width:32%;

display:flex;

flex-direction:column;

gap:12px;

}

/* ===== 共通BOX ===== */

.panel{

background:
rgba(255,255,255,0.84);

backdrop-filter:blur(10px);

border-radius:34px;

border:4px solid #ffdce8;

box-shadow:
0 10px 24px rgba(255,170,190,0.12);

padding:16px;

position:relative;

overflow:hidden;

}

/* キラ */

.panel::before{

content:"";

position:absolute;

top:-80px;
left:-120px;

width:240px;
height:180px;

background:
rgba(255,255,255,0.35);

transform:rotate(25deg);

animation:shine 7s linear infinite;

}

/* ===== タイトル ===== */

.section-title{

height:58px;

display:flex;

align-items:center;
justify-content:center;

background:
linear-gradient(
180deg,
#ff9fbb,
#ff7aa1
);

color:white;

font-size:30px;

font-weight:900;

border-radius:999px;

border:4px solid white;

box-shadow:
0 5px 12px rgba(255,120,170,0.24);

margin-bottom:14px;

}

/* ===== TOP1 ===== */

.top1{

height:130px;

display:flex;

align-items:center;
justify-content:space-between;

padding:0 26px;

border-radius:30px;

background:
linear-gradient(
135deg,
#fff3b7,
#ffe38c
);

border:4px solid rgba(255,255,255,0.9);

box-shadow:
0 6px 14px rgba(0,0,0,0.05);

position:relative;

overflow:hidden;

}

/* 王冠 */

.crown{

font-size:54px;

}

/* 名前 */

.top1-name{

font-size:56px;

font-weight:900;

color:#7a523d;

}

/* 票 */

.top1-vote{

background:
linear-gradient(
180deg,
#ff8fb0,
#ff6e9a
);

color:white;

padding:12px 24px;

border-radius:999px;

font-size:34px;

font-weight:900;

box-shadow:
0 5px 12px rgba(255,120,170,0.25);

}

/* ===== TOP2-5 ===== */

.rank-list{

display:flex;

flex-direction:column;

gap:10px;

}

/* 行 */

.rank{

height:72px;

border-radius:26px;

display:flex;

align-items:center;
justify-content:space-between;

padding:0 20px;

font-size:28px;

font-weight:900;

background:
linear-gradient(
135deg,
#fffafd,
#fff3f7
);

border:4px solid rgba(255,255,255,0.9);

box-shadow:
0 5px 12px rgba(0,0,0,0.04);

position:relative;

overflow:hidden;

}

/* キラ */

.rank::after{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.35),
transparent
);

transform:translateX(-100%);

animation:shine2 5s infinite;

}

/* 左 */

.rank-left{

display:flex;

align-items:center;

gap:14px;

}

/* 順位 */

.rank-num{

width:50px;
height:50px;

border-radius:999px;

display:flex;

align-items:center;
justify-content:center;

background:white;

border:3px solid #ffdce8;

font-size:22px;

box-shadow:
0 4px 10px rgba(0,0,0,0.05);

}

/* 票 */

.vote{

background:
linear-gradient(
180deg,
#ff95b5,
#ff739e
);

padding:8px 18px;

border-radius:999px;

color:white;

font-size:22px;

box-shadow:
0 4px 10px rgba(255,120,170,0.22);

}

/* ===== 右カード ===== */

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:10px;

}

/* 小カード */

.small{

height:120px;

border-radius:28px;

background:
linear-gradient(
180deg,
#fffdfd,
#fff5f8
);

border:4px solid #ffe3ec;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

position:relative;

box-shadow:
0 5px 12px rgba(0,0,0,0.04);

overflow:hidden;

}

/* 小順位 */

.small-rank{

font-size:22px;

color:#ff7aa1;

margin-bottom:6px;

}

/* 小名前 */

.small-name{

font-size:30px;

font-weight:900;

margin-bottom:6px;

}

/* 小票 */

.small-vote{

font-size:22px;

color:#ff7aa1;

font-weight:900;

}

/* ===== 下速報 ===== */

.news{

height:58px;

display:flex;

align-items:center;

padding:0 20px;

gap:16px;

background:white;

border-radius:999px;

border:4px solid #ffdce8;

box-shadow:
0 5px 12px rgba(0,0,0,0.04);

}

/* 速報 */

.news-badge{

height:38px;

padding:0 18px;

border-radius:999px;

display:flex;

align-items:center;
justify-content:center;

background:
linear-gradient(
180deg,
#ff658d,
#ff2f68
);

color:white;

font-size:20px;

font-weight:900;

}

/* 速報文 */

.news-text{

font-size:24px;

font-weight:900;

color:#ff6f9f;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

}

/* 更新 */

.update{

text-align:right;

font-size:14px;

opacity:0.65;

margin-top:4px;

}

/* ===== 切り替え画像 ===== */

#imageScreen{

opacity:0;
pointer-events:none;

position:absolute;

top:0;
left:0;

width:1280px;
height:720px;

z-index:999;

background:
linear-gradient(
180deg,
#ffdbe7,
#fff4f7
);

transition:opacity 1s;

overflow:hidden;

}

#imageScreen img{

width:100%;
height:100%;

object-fit:cover;

display:block;

}

/* ===== アニメ ===== */

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatLogo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes shine{

0%{
transform:
translateX(0)
rotate(25deg);
}

100%{
transform:
translateX(1600px)
rotate(25deg);
}

}

@keyframes shine2{

0%{
transform:translateX(-100%);
}

40%{
transform:translateX(120%);
}

100%{
transform:translateX(120%);
}

}

</style>

</head>

<body>

<!-- 装飾 -->

<div class="float f1">🐾</div>
<div class="float f2">💖</div>
<div class="float f3">✨</div>
<div class="float f4">🦴</div>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3"
type="audio/mpeg">

</audio>

<!-- 切替画像 -->

<div id="imageScreen">

<img
src="event.jpg">

</div>

<!-- 全体 -->

<div class="wrapper">

<!-- 上バー -->

<div class="topbar">

<div class="live">

<div class="live-badge">
LIVE
</div>

<div class="clock"
id="clock">
20:25
</div>

</div>

<div class="telop">
🐶 わんも〜推し犬総選挙 放送中！
</div>

</div>

<!-- ロゴ -->

<div class="logo-wrap">

<img
src="logo.png"
class="logo">

</div>

<!-- メイン -->

<div class="main">

<!-- 左 -->

<div class="left">

<div class="panel">

<div class="section-title">
👑 現在の1位 👑
</div>

<div id="top1"></div>

</div>

<div class="panel" style="flex:1;">

<div class="section-title">
🏆 TOP 5 🏆
</div>

<div class="rank-list"
id="top5">
</div>

</div>

</div>

<!-- 右 -->

<div class="right">

<div class="panel" style="flex:1;">

<div class="section-title">
🐾 6〜10位 🐾
</div>

<div class="grid"
id="top10">
</div>

</div>

<div class="news">

<div class="news-badge">
速報
</div>

<div class="news-text"
id="newsText">

ただいま集計中！

</div>

</div>

<div class="update"
id="update">
更新中...
</div>

</div>

</div>

</div>

<script>

/* ===== GAS ===== */

const API_URL =
"https://script.google.com/macros/s/AKfycby7mjB5m4pMi63DHtdYOgfEZaQ7TJyAi3mOfndk7WHXyWDsvHeqFFCfdHI6BvjQQoNz6g/exec";

/* ===== 時計 ===== */

function updateClock(){

const now =
new Date();

const h =
String(now.getHours())
.padStart(2,"0");

const m =
String(now.getMinutes())
.padStart(2,"0");

document
.getElementById("clock")
.innerText =
`${h}:${m}`;

}

setInterval(
updateClock,
1000
);

updateClock();

/* ===== ランキング ===== */

async function loadRanking(){

try{

const res =
await fetch(API_URL);

const data =
await res.json();

drawRanking(data);

document
.getElementById("update")
.innerText =
"最終更新：" +
new Date()
.toLocaleTimeString();

}catch(e){

console.log(e);

}

}

/* ===== 描画 ===== */

function drawRanking(ranking){

const top1 =
document.getElementById("top1");

const top5 =
document.getElementById("top5");

const top10 =
document.getElementById("top10");

top1.innerHTML = "";
top5.innerHTML = "";
top10.innerHTML = "";

if(ranking.length > 0){

const first = ranking[0];

top1.innerHTML = `

<div class="top1">

<div class="crown">
👑
</div>

<div class="top1-name">
${first.name}
</div>

<div class="top1-vote">
${first.votes}票
</div>

</div>

`;

document
.getElementById("newsText")
.innerText =
"現在の1位は「" +
first.name +
"」！このまま逃げ切れるのか！？";

}

ranking.forEach((dog,i)=>{

if(i >= 1 && i < 5){

top5.innerHTML += `

<div class="rank">

<div class="rank-left">

<div class="rank-num">
${i+1}
</div>

<div>
${dog.name}
</div>

</div>

<div class="vote">
${dog.votes}票
</div>

</div>

`;

}

if(i >= 5 && i < 10){

top10.innerHTML += `

<div class="small">

<div class="small-rank">
${i+1}位
</div>

<div class="small-name">
${dog.name}
</div>

<div class="small-vote">
${dog.votes}票
</div>

</div>

`;

}

});

}

/* ===== 初回 ===== */

loadRanking();

/* ===== 更新 ===== */

setInterval(
loadRanking,
10000
);

/* ===== BGM ===== */

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

/* ===== 画面切替 ===== */

const wrapper =
document.querySelector(
".wrapper"
);

const imageScreen =
document.getElementById(
"imageScreen"
);

let showImage = false;

setInterval(()=>{

showImage = !showImage;

if(showImage){

wrapper.style.opacity = "0";

imageScreen.style.opacity = "1";

imageScreen.style.pointerEvents =
"auto";

}else{

wrapper.style.opacity = "1";

imageScreen.style.opacity = "0";

imageScreen.style.pointerEvents =
"none";

}

},20000);

</script>

</body>
</html>
